name: varda-rekisterointi
on:
  workflow_dispatch:
  push:
    branches: [ master ]
  pull_request:
jobs:
  build:
    services:
      postgres:
        image: postgres:15.7@sha256:68b988a164c8bdf0752fa7a4ae2d4b34a058e21c6327e69f741c081a38e97254
        ports:
          - 5439:5432
        env:
          POSTGRES_USER: varda-rekisterointi
          POSTGRES_DB: varda-rekisterointi
          POSTGRES_PASSWORD: varda-rekisterointi
          POSTGRES_HOST_AUTH_METHOD: trust
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: varda-rekisterointi/package-lock.json
      - name: Build frontend
        working-directory: ./varda-rekisterointi
        run: |
          npm ci
          npm run lint
          npm test
          npm run build
      - uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00 # v4
        with:
          java-version: '21'
          distribution: 'corretto'
          cache: 'maven'
      - name: Maven version
        run: mvn --version
      - name: Build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        working-directory: ./varda-rekisterointi
        run: mvn clean install -B
      - name: Upload varda-rekisterointi-jar
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: varda-rekisterointi-jar
          path: target/varda-rekisterointi.jar